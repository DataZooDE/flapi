# Project name and description
project-name: example-flapi-project
project-description: An example flAPI project demonstrating various configuration options

# Template configuration
template:
  # The path where SQL templates and API endpoint configurations are stored
  path: './sqls'
  # Optional: List of regular expressions for whitelisting environment variables
  environment-whitelist:
    - '^FLAPI_.*'

# Database connection configurations
connections:
  # A BigQuery connection named 'bigquery-lakehouse'
  bigquery-lakehouse: 
    # SQL commands to initialize the connection (e.g., loading extensions)
    init: |
      INSTALL 'bigquery' FROM community;
      LOAD 'bigquery';
    # Connection-specific properties (accessible in templates via {{ context.conn.property_name }})
    properties:
      project_id: 'd-kaercher-lakehouse'

  # A local Parquet file connection
  customers-parquet:
    properties:
      path: './data/customers.parquet'

  northwind-sqlite:
    init: |
      INSTALL sqlite;
      LOAD sqlite;

      ATTACH IF NOT EXISTS './examples/data/northwind.sqlite' AS nw (TYPE sqlite);

  sap-abap-trial:
    init: |
      INSTALL 'erpl' FROM 'http://get.erpl.io';
      LOAD 'erpl';

      CREATE OR REPLACE PERSISTENT SECRET abap_trial (
        TYPE sap_rfc,
        ASHOST 'localhost',
        SYSNR '00',
        CLIENT '001',
        USER 'DEVELOPER',
        PASSWD 'ABAPtr2023#00',
        LANG 'EN'
      );

  # Taxi data connection (for AWS Secrets Manager auth demo)
  taxi-parquet:
    properties:
      path: './data/taxi'  # Placeholder - requires taxi parquet files

# Heartbeat configuration
heartbeat:
  enabled: true # Whether to enable the heartbeat worker, off by default
  worker-interval: 10

# HTTPS enforcement configuration
enforce-https:
  # Whether to force HTTPS for all connections
  enabled: false

# Direct TLS termination by flAPI's embedded server (optional). Production
# deployments usually terminate TLS at a reverse proxy; enable this only
# if flAPI is exposed directly.
# https:
#   enabled: true
#   ssl_cert_file: './ssl/cert.pem'
#   ssl_key_file: './ssl/key.pem'

# CORS allow-list. The historic wildcard '*' is permitted but the
# startup auditor warns if it is combined with auth.enabled: true
# (credential-bearing requests across origins).
cors:
  allow-origins:
    - '*'   # dev/demo default; replace with a real allow-list for production
    # - https://app.example.com

# Per-request JSONL audit log (off by default). Sink can be 'stdout' (for
# container log collectors) or 'file' (with a `path` key); `redact`
# replaces the listed parameter names with <redacted> in the emitted
# JSON. Covers both REST and MCP traffic.
# audit:
#   enabled: true
#   sink: file
#   path: ./logs/audit.jsonl
#   redact:
#     - password
#     - api_key

# Global rate limiting (off by default). `key` picks the bucket: `ip`
# (legacy), `user` (authenticated principal only), or `user-or-ip`
# (principal when present, IP fallback — recommended for share-NAT users).
# rate_limit:
#   enabled: true
#   max: 100
#   interval: 60
#   key: user-or-ip

# DuckDB configuration
duckdb:
  # db_path: ./flapi_cache.db  # Optional: remove or comment out for in-memory database
  access_mode: READ_WRITE
  threads: 8
  max_memory: 8GB
  default_order: DESC

# DuckLake configuration (for advanced caching with snapshots and time-travel)
ducklake:
  enabled: true
  alias: cache  # Catalog alias for DuckLake tables
  metadata-path: ./data/cache.ducklake  # Path to DuckLake metadata
  data-path: ./data/cache  # Path to DuckLake data files
  retention:
    keep-last-snapshots: 10  # Keep last 10 snapshots for each table
    max-snapshot-age: 30d    # Delete snapshots older than 30 days
  compaction:
    enabled: true
    schedule: '@daily'  # Run compaction daily
  scheduler:
    enabled: true
    scan-interval: 5m  # Check for scheduled cache refreshes every 5 minutes

# ====================================================================================
# MCP (Model Context Protocol) Support
# ====================================================================================
# flAPI now automatically enables MCP server - no separate configuration needed!
# Any configuration file in the sqls/ directory can define:
# - REST endpoints (if 'url-path' is present)
# - MCP tools (if 'mcp-tool' section is present)
# - MCP resources (if 'mcp-resource' section is present)
# - Or any combination of the above!
#
# Example unified configuration in sqls/customers-unified.yaml:
# url-path: /customers/                    # Makes this a REST endpoint
# mcp-tool:                                # Also makes this an MCP tool
#   name: get_customers
#   description: Retrieve customer information by ID
# request:
#   - field-name: id
#     # ... rest of parameter definitions
# template-source: customers.sql
# connection: [customers-parquet]
# # ... other common sections work for both REST and MCP

# ====================================================================================
# MCP Server Configuration
# ====================================================================================
mcp:
  enabled: true
  port: 8081
  host: localhost
  allow-list-changed-notifications: true

  # Tool-description hygiene scanner. When true, flAPI refuses to start
  # if any mcp-tool.description contains control characters,
  # JSON-breakout patterns, or known role-override phrases ("ignore
  # previous instructions"). Recommended for production.
  # strict-descriptions: true

  # When auth.enabled is true, every mcp-tool MUST declare
  # `allowed-roles` — tools without one are denied by default. This
  # secure-by-default stance prevents a freshly-added tool from being
  # callable by any authenticated user.
  # auth:
  #   enabled: true
  #   type: bearer
  #   jwt-secret: '${MCP_JWT_SECRET}'
  #   jwt-issuer: 'https://issuer.example.com'

  # Option 1: Load instructions from external markdown file
  # This file contains usage guidance for LLM clients
  instructions-file: ./mcp_instructions.md

  # Option 2: Inline instructions (alternative to file)
  # Uncomment the following to use inline instructions instead
  # instructions: |
  #   # flapi MCP Server
  #
  #   SQL-based data access through MCP tools.
  #
  #   ## Usage
  #   - Use search tools for filtering
  #   - Apply pagination with limit parameter
  #   - Check tool descriptions for cache status

# Per-tool hardening lives inside each endpoint's `mcp-tool:` block.
# A production-ready tool typically looks like:
#
#   mcp-tool:
#     name: customer_lookup
#     description: Look up a customer by id.
#     allowed-roles: [analyst, admin]   # required when mcp.auth.enabled
#     response:
#       max-rows: 1000                  # hard cap on returned rows
#       redact-columns: [ssn, salary]   # replace listed columns with <redacted>
#       # sample: true                  # return summary only, never rows
#     rate-limit:
#       enabled: true
#       max: 30                         # per-tool quota per principal
#       interval: 60
#
# MCP clients may also pass `_dryRun: true` in `tools/call` arguments —
# flAPI renders the SQL + EXPLAIN plan and returns it without executing
# the query. Use for shadow-mode audits before promoting an endpoint.

